#----------------------------------------------------------------------------
# Generic profile for WiiM devices (Mini, Pro, Ultra, and unknown models)
# For WiiM Pro Plus, see Linkplay-WiiM-ProPlus.conf
#----------------------------------------------------------------------------

RendererName = WiiM
RendererIcon = WiiM.png

# LoadingPriority = 1 so that the more-specific Pro Plus conf (priority 2)
# wins when both match the same device.
LoadingPriority = 1

# ============================================================================
# Matches any WiiM device manufactured by Linkplay Technology Inc.
# ============================================================================

UserAgentSearch = WiiMHome
UpnpDetailsSearch = Linkplay Technology Inc. , WiiM

Video = false
Image = false

# Transcode audio that exceeds native limits to LPCM (WAV PCM).
# LPCM is universally supported by all WiiM devices.
TranscodeAudio = LPCM

# Supported audio formats (conservative — safe for all WiiM models):
# FLAC capped at 192kHz; anything higher is transcoded to LPCM.
Supported = f:mp3               n:2  s:48000   m:audio/mpeg
Supported = f:aac               n:2  s:48000   m:audio/aac
Supported = f:alac              n:2  s:96000   m:audio/m4a|audio/x-m4a
Supported = f:ape               n:2  s:48000   m:audio/x-ape
Supported = f:flac              n:2  s:192000  m:audio/x-flac
Supported = f:wav               n:2  s:192000  m:audio/wav
Supported = f:wma               n:2  s:48000   m:audio/x-ms-wma
Supported = f:ogg|oga           n:2  s:48000   m:audio/ogg
